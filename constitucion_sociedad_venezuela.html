
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans,sans-serif);color:var(--color-text-primary);background:transparent}
.wrap{padding:1rem 0 2rem}
.top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:1.5rem;flex-wrap:wrap}
.meta{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.pill{font-size:11px;padding:3px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);color:var(--color-text-secondary)}
.pill.amber{background:#FAEEDA;color:#633806;border-color:#EF9F27}
.pill.blue{background:#E6F1FB;color:#0C447C;border-color:#85B7EB}
.pill.green{background:#EAF3DE;color:#27500A;border-color:#97C459}
.summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:1.5rem}
.scard{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:12px 14px}
.scard-n{font-size:20px;font-weight:500}
.scard-l{font-size:11px;color:var(--color-text-secondary);margin-top:2px;line-height:1.4}
.prog-wrap{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;margin-bottom:1.5rem}
.prog-label{font-size:12px;color:var(--color-text-secondary);margin-bottom:8px}
.prog-track{height:6px;border-radius:3px;background:var(--color-background-secondary);overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:#BA7517;transition:width .4s}
.prog-pct{font-size:12px;color:var(--color-text-secondary);margin-top:6px;text-align:right}
.phase-block{margin-bottom:10px}
.phase-header{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);cursor:pointer;border:0.5px solid var(--color-border-tertiary);user-select:none}
.phase-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.phase-name{font-size:13px;font-weight:500;flex:1}
.phase-meta{font-size:11px;color:var(--color-text-secondary)}
.phase-chevron{font-size:10px;color:var(--color-text-secondary);transition:transform .2s}
.phase-chevron.open{transform:rotate(180deg)}
.steps{margin-top:6px;display:none;flex-direction:column;gap:6px}
.steps.open{display:flex}
.step{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);background:var(--color-background-primary);overflow:hidden}
.step-header{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;cursor:pointer}
.step-num{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;margin-top:1px}
.step-info{flex:1}
.step-title{font-size:13px;font-weight:500;line-height:1.4}
.step-sub{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.step-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.chk{width:18px;height:18px;border-radius:4px;border:0.5px solid var(--color-border-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;background:var(--color-background-primary)}
.chk.done{background:#BA7517;border-color:#BA7517}
.chk svg{display:none}
.chk.done svg{display:block}
.cost-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:#FAEEDA;color:#633806;white-space:nowrap}
.time-tag{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--color-background-secondary);color:var(--color-text-secondary);white-space:nowrap}
.docs{margin:0 14px 12px 46px;padding:10px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);display:none}
.docs.open{display:block}
.docs-title{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.doc-item{display:flex;align-items:flex-start;gap:6px;font-size:12px;color:var(--color-text-secondary);padding:3px 0;line-height:1.4}
.doc-item::before{content:'·';flex-shrink:0}
.note-box{border-left:2px solid #BA7517;border-radius:0;padding:10px 14px;background:#FAEEDA20;margin:0 14px 12px 46px;display:none}
.note-box.open{display:block}
.note-box p{font-size:12px;color:var(--color-text-secondary);line-height:1.5}
.toggle-docs{font-size:11px;color:var(--color-text-secondary);border:none;background:none;cursor:pointer;padding:0;margin-left:46px;margin-bottom:8px;display:none}
.toggle-docs.visible{display:inline-block}
.step.checked .step-title{text-decoration:line-through;color:var(--color-text-secondary)}
.total-row{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:1rem;flex-wrap:wrap;gap:8px}
.total-label{font-size:13px;color:var(--color-text-secondary)}
.total-val{font-size:18px;font-weight:500}
.ask-btn{margin-top:1rem;width:100%}
</style>

<div class="wrap">
<h2 style="position:absolute;left:-9999px">Hoja de ruta — constitución de compañía anónima en Venezuela</h2>

<div class="top">
  <div>
    <div style="font-size:16px;font-weight:500;margin-bottom:6px">Constitución C.A. — Venezuela</div>
    <div class="meta">
      <span class="pill amber">Duración estimada: 3–6 semanas</span>
      <span class="pill blue">Costo total: ~$930 – $1.400</span>
      <span class="pill green">12 pasos</span>
    </div>
  </div>
</div>

<div class="summary" id="summary-cards"></div>

<div class="prog-wrap">
  <div class="prog-label">Progreso general</div>
  <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  <div class="prog-pct" id="prog-pct">0 de 12 completados</div>
</div>

<div id="phases"></div>

<div class="total-row">
  <span class="total-label">Presupuesto total estimado</span>
  <span class="total-val">$930 – $1.400 USD</span>
</div>

<button class="ask-btn" onclick="sendPrompt('¿Qué abogado mercantil necesito para constituir una C.A. en Venezuela y qué le debo pedir exactamente?')">¿Qué le pido al abogado mercantil? ↗</button>
</div>

<script>
const PHASES = [
  {
    id:'p1', label:'Fase 1 — Decisiones previas', color:'#BA7517', bg:'#FAEEDA',
    meta:'Semana 1 · Sin costo directo',
    steps:[
      {
        id:'s1', num:'01',
        title:'Decidir estructura societaria',
        sub:'¿Una sola C.A. o holding + 3 subsidiarias?',
        time:'2–3 días', cost:'$0',
        docs:['Reunión con abogado mercantil para evaluar opciones','Definir socios fundadores y porcentajes de acciones','Decidir si una C.A. cubre los 3 objetos sociales (academia, fábrica, distribuidora) o se separan','Confirmar domicilio fiscal de la empresa (dirección en Caracas)'],
        note:'Para CulturaPizza recomendamos empezar con una sola C.A. con objeto social amplio. Es más barato ahora y se puede segmentar después. Costo de separar en 3 empresas: +$2.800–$4.200 adicionales.'
      },
      {
        id:'s2', num:'02',
        title:'Elegir nombre comercial',
        sub:'Reservar "CulturaPizza C.A." ante el SAREN',
        time:'1 día', cost:'~$60',
        docs:['Preparar 2–3 opciones de nombre en orden de preferencia','Consultar disponibilidad en línea: saren.gob.ve','Pagar búsqueda de nombre: ~$60 (1 PTR)','Obtener constancia de reserva de nombre (válida por 30 días)'],
        note:'El nombre debe incluir la denominación "Compañía Anónima" o "C.A." al final. Ejemplo: CulturaPizza Venezuela C.A.'
      },
    ]
  },
  {
    id:'p2', label:'Fase 2 — Documentación legal', color:'#185FA5', bg:'#E6F1FB',
    meta:'Semana 1–2 · ~$600–$900',
    steps:[
      {
        id:'s3', num:'03',
        title:'Redacción del acta constitutiva y estatutos',
        sub:'El abogado elabora el documento fundacional',
        time:'3–5 días', cost:'$200–$400',
        docs:['Definir objeto social (actividades de la empresa — debe ser amplio)','Establecer capital social inicial y distribución de acciones','Designar Junta Directiva: Presidente, Director, Comisario','Fijar duración de la empresa (generalmente 50 años)','Establecer domicilio social','El abogado redacta, visa y firma el documento'],
        note:'Es el documento más importante. Un objeto social mal redactado puede impedirte facturar ciertas actividades. Asegúrate de incluir: elaboración y venta de alimentos, importación/exportación, servicios educativos y de capacitación.'
      },
      {
        id:'s4', num:'04',
        title:'Balance de apertura o depósito bancario',
        sub:'Justificar el capital inicial ante el Registro Mercantil',
        time:'2–3 días', cost:'$200 (contador)',
        docs:['Opción A — Depósito bancario: abrir cuenta temporal a nombre de la empresa en formación y depositar el capital mínimo exigido','Opción B — Balance de inventario: contador elabora inventario valorado de bienes (hornos, equipos, mobiliario) que sumen el capital mínimo','El contador firma, visa y sella el documento','Capital mínimo exigido para empresa productora: ~$1.500–$3.000 según el Registro Mercantil'],
        note:'La opción B (inventario de bienes) es más práctica para CulturaPizza si ya tienes equipos o activos. Evita inmovilizar efectivo en una cuenta bancaria.'
      },
      {
        id:'s5', num:'05',
        title:'Carta de aceptación del Comisario',
        sub:'Figura obligatoria en toda C.A.',
        time:'1–2 días', cost:'$100',
        docs:['El Comisario es un contador público independiente que fiscaliza la empresa','Debe ser distinto al contador que hace el balance de apertura','Redactar y firmar carta de aceptación del cargo','Incluir copia de su cédula y título de contador'],
        note:'El Comisario no participa en la gestión del día a día. Es una figura de control legal obligatoria. Su función real empieza cuando hay asambleas de accionistas o modificaciones estatutarias.'
      },
    ]
  },
  {
    id:'p3', label:'Fase 3 — Registro Mercantil (SAREN)', color:'#3B6D11', bg:'#EAF3DE',
    meta:'Semana 2–3 · ~$270–$400',
    steps:[
      {
        id:'s6', num:'06',
        title:'Presentación del expediente ante el Registro Mercantil',
        sub:'Consignar toda la documentación ante el SAREN',
        time:'1 día', cost:'$150',
        docs:['Acta constitutiva y estatutos (original + copias)','Balance de apertura o constancia de depósito bancario','Cédulas de identidad de todos los socios fundadores','Carta de aceptación del Comisario','Constancia de reserva del nombre','Pago de tasas: inscripción ~$150 (base $30 + $12/folio)','El sistema del SAREN asigna número de expediente'],
        note:'Puedes hacer el trámite presencialmente en el Registro Mercantil de Caracas (Av. Urdaneta) o iniciar en línea en saren.gob.ve. El trámite presencial con gestor es más rápido.'
      },
      {
        id:'s7', num:'07',
        title:'Pago del arancel sobre el capital',
        sub:'2% del capital social declarado',
        time:'1 día', cost:'$60–$200',
        docs:['Calcular el 2% sobre el capital inicial','Ejemplo: capital $3.000 → arancel $60','Pagar en la taquilla del Registro Mercantil','Conservar comprobante de pago'],
        note:'Este es el arancel más variable. Si puedes declarar el capital mínimo exigido (y no más), el costo baja. Consulta con el abogado el mínimo aceptable para tu objeto social.'
      },
      {
        id:'s8', num:'08',
        title:'Sellado y foliado de libros contables',
        sub:'5 libros obligatorios por ley',
        time:'1 día', cost:'$60',
        docs:['Libro Diario','Libro Mayor','Libro de Inventarios','Libro de Actas de Asamblea','Libro de Accionistas','Costo: ~$6 por libro de 100 folios = $60 total','Presentar los libros físicos en el Registro Mercantil para sello oficial'],
        note:'Los libros los consigues en cualquier librería o papelería. Deben ser empastados, no de hojas sueltas. Lleva también el acta constitutiva cuando vayas a sellarlos.'
      },
      {
        id:'s9', num:'09',
        title:'Protocolización y publicación en prensa',
        sub:'Obligatorio para darle publicidad legal a la empresa',
        time:'3–5 días', cost:'$50–$100',
        docs:['El Registro Mercantil protocoliza el acta y la devuelve sellada','Publicar un extracto del acta en un diario de circulación nacional (ej. Últimas Noticias)','Consignar ejemplar del diario con la publicación ante el Registro Mercantil','Obtener certificado de inscripción definitivo'],
        note:'La publicación en prensa es el paso que más gente olvida. Sin ella, la empresa está inscrita pero no es válida legalmente para terceros. El abogado normalmente gestiona esto.'
      },
    ]
  },
  {
    id:'p4', label:'Fase 4 — Registros obligatorios post-constitución', color:'#534AB7', bg:'#EEEDFE',
    meta:'Semana 3–6 · trámites paralelos',
    steps:[
      {
        id:'s10', num:'10',
        title:'Obtención del RIF ante el SENIAT',
        sub:'Registro de Información Fiscal — indispensable para facturar',
        time:'1–3 días', cost:'$0',
        docs:['Ingresar al portal seniat.gob.ve','Solicitar inscripción de persona jurídica','Cargar: acta constitutiva protocolizada, cédulas de representantes, comprobante de domicilio','El RIF se obtiene en línea — imprimir y conservar','El RIF es el número fiscal de la empresa para toda operación tributaria'],
        note:'Sin el RIF no puedes emitir facturas. Es el primer trámite a hacer una vez tienes el acta protocolizada. Es gratuito y se hace 100% en línea.'
      },
      {
        id:'s11', num:'11',
        title:'Patente de industria y comercio (Alcaldía)',
        sub:'Permiso municipal para operar en Caracas',
        time:'2–4 semanas', cost:'Variable',
        docs:['Dirección de Hacienda Municipal del Municipio Libertador o Chacao (según ubicación)','Documentos requeridos: acta constitutiva, RIF, contrato de arrendamiento del local, solvencia de hacienda','Pago de tasa municipal según actividad económica','Obtener Licencia de Actividades Económicas (LAE)'],
        note:'Este trámite puede tardar más que el registro mercantil. Iniciar en paralelo con el resto. La tasa varía según el municipio y el tipo de actividad.'
      },
      {
        id:'s12', num:'12',
        title:'Registros laborales y parafiscales',
        sub:'Obligatorio al contratar el primer empleado',
        time:'1–2 semanas', cost:'$0',
        docs:['IVSS — Instituto Venezolano de los Seguros Sociales: registro en línea ivss.gob.ve','INCES — Instituto Nacional de Capacitación: registro en inces.gob.ve','BANAVIH — Fondo de Ahorro Habitacional: registro en banavih.gob.ve','MINPPTRASS — Ministerio del Trabajo: registro patronal','Todos los trámites son gratuitos y en línea'],
        note:'Puedes diferir estos registros hasta tener el primer empleado formal. Sin embargo, si vas a operar con personal desde el primer día, regístralos antes de pagar el primer salario.'
      },
    ]
  }
];

let checked = {};
let openPhases = {p1:true,p2:true,p3:false,p4:false};
let openDocs = {};

function togglePhase(id){
  openPhases[id] = !openPhases[id];
  render();
}
function toggleDocs(id,e){
  e.stopPropagation();
  openDocs[id] = !openDocs[id];
  render();
}
function toggleCheck(id,e){
  e.stopPropagation();
  checked[id] = !checked[id];
  render();
}

function render(){
  const allSteps = PHASES.flatMap(p=>p.steps);
  const total = allSteps.length;
  const done = allSteps.filter(s=>checked[s.id]).length;
  const pct = Math.round(done/total*100);

  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-pct').textContent = done+' de '+total+' completados';

  const p1done = PHASES[0].steps.filter(s=>checked[s.id]).length;
  const p2done = PHASES[1].steps.filter(s=>checked[s.id]).length;
  const p3done = PHASES[2].steps.filter(s=>checked[s.id]).length;
  const p4done = PHASES[3].steps.filter(s=>checked[s.id]).length;
  document.getElementById('summary-cards').innerHTML = `
    <div class="scard"><div class="scard-n" style="color:#BA7517">${p1done}/${PHASES[0].steps.length}</div><div class="scard-l">Decisiones previas</div></div>
    <div class="scard"><div class="scard-n" style="color:#185FA5">${p2done}/${PHASES[1].steps.length}</div><div class="scard-l">Documentación legal</div></div>
    <div class="scard"><div class="scard-n" style="color:#3B6D11">${p3done}/${PHASES[2].steps.length}</div><div class="scard-l">Registro Mercantil</div></div>
    <div class="scard"><div class="scard-n" style="color:#534AB7">${p4done}/${PHASES[3].steps.length}</div><div class="scard-l">Registros post-const.</div></div>
  `;

  document.getElementById('phases').innerHTML = PHASES.map(ph=>{
    const isOpen = openPhases[ph.id];
    const phDone = ph.steps.filter(s=>checked[s.id]).length;
    const stepsHtml = ph.steps.map(s=>{
      const isDone = checked[s.id];
      const docsOpen = openDocs[s.id];
      return `<div class="step${isDone?' checked':''}">
        <div class="step-header" onclick="toggleDocs('${s.id}',event)">
          <div class="step-num" style="background:${ph.bg};color:${ph.color}">${s.num}</div>
          <div class="step-info">
            <div class="step-title">${s.title}</div>
            <div class="step-sub">${s.sub}</div>
          </div>
          <div class="step-right">
            <div class="chk${isDone?' done':''}" onclick="toggleCheck('${s.id}',event)">
              <svg width="10" height="8" viewBox="0 0 10 8" fill="none"><path d="M1 4l3 3 5-6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <span class="cost-tag">${s.cost}</span>
            <span class="time-tag">${s.time}</span>
          </div>
        </div>
        <div class="docs${docsOpen?' open':''}">
          <div class="docs-title">Qué hacer / documentos necesarios</div>
          ${s.docs.map(d=>`<div class="doc-item"><span>${d}</span></div>`).join('')}
        </div>
        ${s.note?`<div class="note-box${docsOpen?' open':''}"><p>${s.note}</p></div>`:''}
      </div>`;
    }).join('');

    return `<div class="phase-block">
      <div class="phase-header" onclick="togglePhase('${ph.id}')">
        <div class="phase-dot" style="background:${ph.color}"></div>
        <span class="phase-name">${ph.label}</span>
        <span class="phase-meta">${ph.meta} &nbsp;·&nbsp; ${phDone}/${ph.steps.length}</span>
        <span class="phase-chevron${isOpen?' open':''}">▼</span>
      </div>
      <div class="steps${isOpen?' open':''}">${stepsHtml}</div>
    </div>`;
  }).join('');
}

render();
</script>
